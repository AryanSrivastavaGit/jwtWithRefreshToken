# The modern MySQL JDBC driver class name (Spring Boot usually auto-detects this)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================================
# Spring Data JPA / Hibernate Configurations
# =====================================================================
# Defines how the schema is managed. Options: update, create, create-drop, validate, none
spring.jpa.hibernate.ddl-auto=update

# Generates SQL statements that are highly compatible with your specific MySQL version
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Show SQL queries in the console (useful for development)
spring.jpa.show-sql=true

# Format the logged SQL queries to make them highly readable
spring.jpa.properties.hibernate.format_sql=true


